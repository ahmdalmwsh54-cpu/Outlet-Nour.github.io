<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nour Outlet | متجر الملابس العالمي</title>
    <style>
        :root { --bg: #f5f3e9; --accent: #1a4d2e; --white: #ffffff; }
        body { background-color: var(--bg); color: var(--accent); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; line-height: 1.6; text-align: center; }
        nav { background-color: var(--accent); padding: 15px; }
        nav a { color: var(--white); margin: 0 10px; text-decoration: none; font-weight: bold; }
        .logo { width: 200px; margin: 20px auto; border-radius: 50%; border: 3px solid var(--accent); }
        .container { max-width: 900px; margin: auto; padding: 20px; }
        .section { background: var(--white); padding: 25px; margin: 20px 0; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .gallery img { width: 100%; height: 250px; object-fit: cover; border-radius: 10px; border: 2px solid var(--accent); }
        .btn { background-color: var(--accent); color: var(--white); padding: 12px 30px; text-decoration: none; border-radius: 25px; display: inline-block; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<nav>
    <a href="#home">الرئيسية</a> <a href="#about">من نحن</a> <a href="#gallery">المعرض</a> <a href="#contact">اتصل بنا</a>
</nav>

<header id="home">
    <img src="IMG_3025.jpeg" class="logo" alt="Nour Outlet Logo">
    <h1>Nour Outlet</h1>
    <p>أناقة عالمية بأسعار تنافسية</p>
</header>

<div class="container">
    <section id="about" class="section">
        <h2>من نحن</h2>
        <p>نحن متجر إلكتروني مختص في بيع قطع الملابس العالمية بجودة عالية وأسعار تناسب الجميع.</p>
    </section>

    <section id="gallery" class="section">
        <h2>معرض الصور</h2>
        <div class="gallery">
            <img src="IMG_3258.png" alt="منتج 1">
            <img src="IMG_3259.png" alt="منتج 2">
            <img src="IMG_3260.png" alt="منتج 3">
            <img src="IMG_3257.png" alt="منتج 4">
        </div>
    </section>

    <section id="contact" class="section">
        <h2>تواصل معنا</h2>
        <p>للاتصال المباشر: <b>0780183836</b></p>
        <a href="tel:0780183836" class="btn">اتصل الآن</a>
    </section>
</div>

</body>
</html>
